<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>世界神话地图 · World Mythology Map</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <!-- Loading Screen -->
  <div class="loading-screen">
    <div class="loading-title">世界神话地图</div>
    <div class="loading-sub">WORLD MYTHOLOGY MAP</div>
    <div class="loading-spinner"></div>
  </div>

  <!-- Audio Controls (top-left) -->
  <div class="audio-control">
    <button class="audio-btn" title="Play/Stop Music">♪</button>
    <span class="audio-info"></span>
  </div>

  <!-- Header -->
  <header class="header">
    <h1>世界神话地图</h1>
    <div class="stats">Loading...</div>
    <div class="country-display"></div>
  </header>

  <!-- 3D Globe Canvas -->
  <canvas id="globe-canvas"></canvas>

  <!-- Right Sidebar -->
  <aside class="sidebar">
    <div class="sidebar-top">
      <input type="text" class="sidebar-search" placeholder="搜索神话 Search myths...">
    </div>

    <div class="sidebar-country" style="display:none;">
      <div class="sidebar-country-header">
        <span class="sidebar-country-name"></span>
        <button class="sidebar-back">← All</button>
      </div>
      <div class="sidebar-stats">
        <div class="sidebar-stat">
          <div class="num myth-count">0</div>
          <div class="label">Myths</div>
        </div>
        <div class="sidebar-stat">
          <div class="num theme-count">0</div>
          <div class="label">Themes</div>
        </div>
      </div>
    </div>

    <div class="story-scroll">
      <div class="story-grid"></div>
    </div>
  </aside>

  <!-- Bottom Story Detail Panel -->
  <div class="story-panel">
    <button class="story-panel-close">&times;</button>
    <div class="story-panel-img-container">
      <div class="story-panel-img-placeholder">...</div>
    </div>
    <div class="story-panel-content">
      <div class="story-panel-title"></div>
      <div class="story-panel-tags"></div>
      <div class="story-panel-text"></div>
    </div>
  </div>

  <!-- Bottom Filter Bar -->
  <div class="filter-container">
    <div class="filter-row" id="theme-filters"></div>
    <div class="filter-row">
      <span id="era-filters"></span>
      <div class="toggle-group">
        <span class="toggle-label">Labels</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-labels">
          <span class="toggle-slider"></span>
        </label>
      </div>
      <div class="toggle-group">
        <span class="toggle-label">Lines</span>
        <label class="toggle-switch">
          <input type="checkbox" id="toggle-lines" checked>
          <span class="toggle-slider"></span>
        </label>
      </div>
    </div>
  </div>

  <!-- Three.js from CDN -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

  <!-- App entry point (ES module) -->
  <script type="module" src="js/app.js"></script>

</body>
</html>
